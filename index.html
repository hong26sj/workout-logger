<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#111827" />
  <title>근력 운동 기록</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <div>
      <p class="eyebrow">WORKOUT LOGGER</p>
      <h1>근력 운동 기록</h1>
    </div>
    <button id="settingsBtn" class="icon-btn" aria-label="설정">⚙︎</button>
  </header>

  <main>
    <section class="card">
      <div class="section-head">
        <h2>오늘 운동</h2>
        <span id="todayLabel" class="muted"></span>
      </div>

      <label>
        운동명
        <input id="exerciseName" type="text" list="exerciseOptions" placeholder="예: 체스트프레스" autocomplete="off" />
        <datalist id="exerciseOptions"></datalist>
        <div id="previousRecord" class="previous-record hidden"></div>
      </label>

      <label>
        기록 유형
        <select id="recordType">
          <option value="weighted">무게 · 횟수 · 세트</option>
          <option value="bodyweight">횟수 · 세트</option>
          <option value="timed">시간 · 세트</option>
        </select>
      </label>

      <div id="weightedFields" class="grid-3">
        <label>무게(kg)<input id="weightKg" type="number" min="0" step="0.5" inputmode="decimal" /></label>
        <label>횟수<input id="repsWeighted" type="number" min="1" step="1" inputmode="numeric" /></label>
        <label>세트<input id="setsWeighted" type="number" min="1" step="1" inputmode="numeric" value="3" /></label>
      </div>

      <div id="bodyweightFields" class="grid-2 hidden">
        <label>횟수<input id="repsBodyweight" type="number" min="1" step="1" inputmode="numeric" /></label>
        <label>세트<input id="setsBodyweight" type="number" min="1" step="1" inputmode="numeric" value="3" /></label>
      </div>

      <div id="timedFields" class="grid-2 hidden">
        <label>시간(초)<input id="secondsTimed" type="number" min="1" step="1" inputmode="numeric" /></label>
        <label>세트<input id="setsTimed" type="number" min="1" step="1" inputmode="numeric" value="3" /></label>
      </div>

      <details>
        <summary>선택 입력</summary>
        <div class="grid-2 details-grid">
          <label>RPE(1~10)<input id="rpe" type="number" min="1" max="10" step="1" inputmode="numeric" /></label>
          <label>통증(0~10)<input id="painLevel" type="number" min="0" max="10" step="1" inputmode="numeric" value="0" /></label>
        </div>
        <label>통증 부위<input id="painArea" type="text" placeholder="없음" /></label>
        <label>메모<textarea id="memo" rows="2" placeholder="자세, 불편감, 특이사항"></textarea></label>
      </details>

      <button id="addExerciseBtn" class="primary">운동 추가</button>
      <button id="cancelEditBtn" class="secondary hidden">수정 취소</button>
    </section>

    <section class="card">
      <div class="section-head">
        <h2>입력 목록</h2>
        <span id="exerciseCount" class="badge">0개</span>
      </div>
      <div id="emptyState" class="empty">아직 입력된 운동이 없습니다.</div>
      <div id="exerciseList" class="exercise-list"></div>
      <div class="actions">
        <button id="saveSessionBtn" class="primary" disabled>오늘 기록 저장</button>
        <button id="clearBtn" class="secondary" disabled>목록 비우기</button>
      </div>
    </section>

    <section class="card">
      <div class="section-head">
        <h2>최근 기록</h2>
        <div class="history-actions">
          <button id="refreshDriveBtn" class="text-btn">Drive 새로고침</button>
          <button id="exportAllBtn" class="text-btn">전체 내보내기</button>
        </div>
      </div>
      <div id="syncStatus" class="sync-status"></div>
      <div id="historyList" class="history-list"></div>
    </section>
  </main>

  <dialog id="settingsDialog">
    <form method="dialog" class="dialog-card">
      <div class="section-head">
        <h2>설정</h2>
        <button value="cancel" class="icon-btn">✕</button>
      </div>
      <label>
        Google Apps Script 웹 앱 URL
        <input id="gasUrl" type="url" placeholder="https://script.google.com/macros/s/.../exec" />
      </label>
      <p class="help">기본 URL이 앱에 내장되어 있습니다. 주소가 변경된 경우에만 수정하세요.</p>
      <div class="actions">
        <button id="saveSettingsBtn" value="default" class="primary">저장</button>
      </div>
    </form>
  </dialog>

  <div id="toast" class="toast" role="status"></div>
  <script src="app.js"></script>
</body>
</html>
